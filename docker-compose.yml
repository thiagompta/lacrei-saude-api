services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lacrei_saude
      POSTGRES_USER: lacrei
      POSTGRES_PASSWORD: lacrei123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lacrei -d lacrei_saude"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: django-insecure-lacrei-saude-dev-key-2026
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://lacrei:lacrei123@db:5432/lacrei_saude
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data: